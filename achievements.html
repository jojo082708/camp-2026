<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>逐光啟程｜關於我們</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root { --sun: #FFB830; --sky: #4EC3E0; --leaf: #5BBF7A; --puren-orange: #F26522; --puren-dark: #1A1A1A; --cream: #FFF8EE; --text-dark: #2C2416; --text-mid: #5A4A2E; --shadow: rgba(255,184,48,.15); }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--cream); color: var(--text-dark); display: flex; flex-direction: column; min-height: 100vh; }
    
    /* 簡易導覽列與頁尾 (建議後續換成你 index.html 的完整版) */
    nav { background: #fff; border-bottom: 3px solid var(--puren-orange); padding: 1rem 2rem; display: flex; gap: 1rem; }
    nav a { text-decoration: none; color: var(--text-dark); font-weight: 500; }
    nav a:hover { color: var(--puren-orange); }
    footer { background: var(--puren-dark); color: rgba(255,255,255,.5); text-align: center; padding: 2rem; margin-top: auto; }

    /* 子網頁內容區塊 */
    .page-header { background: linear-gradient(135deg, #FFF3CC, #FFE0A3); padding: 3rem 2rem; text-align: center; }
    .page-title { font-family: 'Noto Serif TC', serif; font-size: 2rem; color: var(--text-dark); }
    .page-content { max-width: 800px; margin: 2rem auto; padding: 2rem; background: #fff; border-radius: 16px; box-shadow: 0 4px 20px var(--shadow); line-height: 1.8; }
    
    /* 成員頁面專用表格 */
    .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-top: 1rem; }
    .team-box { border-left: 4px solid var(--sky); padding: 1rem; background: #f9f9f9; }
  </style>
</head>
<body>
