<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>逐光啟程｜歷屆成果</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root { 
      --puren-orange: #F26522; 
      --puren-dark: #1A1A1A; 
      --cream: #FFF8EE; 
      --text-dark: #2C2416; 
      --shadow: rgba(255,184,48,.15); 
    }
    
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: 'Noto Sans TC', sans-serif; 
      background: var(--cream); 
      color: var(--text-dark); 
      display: flex; 
      flex-direction: column; 
      min-height: 100vh; 
    }
    
    /* 導覽列 */
    nav { 
      background: rgba(255,255,255,.97); 
      border-bottom: 3px solid var(--puren-orange); 
      padding: 1rem 2rem; 
      display: flex; 
      gap: 1.5rem;
      align-items: center; 
    }
    nav a { text-decoration: none; color: var(--text-dark); font-weight: 500; }
    nav a:hover { color: var(--puren-orange); }

    /* 標題與內容區塊 */
    .page-header { background: linear-gradient(135deg, #FFF3CC, #FFE0A3); padding: 4rem 2rem; text-align: center; }
    .page-title { font-family: 'Noto Serif TC', serif; font-size: 2.5rem; color: var(--text-dark); }
    
    .page-content { 
      max-width: 900px; 
      margin: 3rem auto; 
      padding: 3rem; 
      background: #fff; 
      border-radius: 16px; 
      box-shadow: 0 4px 20px var(--shadow); 
      min-height: 200px; /* 確保內容區塊有一點基本高度 */
    }

    /* 黑色頁尾 */
    footer { 
      background: var(--puren-dark); 
      color: rgba(255,255,255,.55); 
      text-align: center; 
      padding: 2rem 1rem; 
      margin-top: auto; /* 將頁尾推到底部 */
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" style="color:var(--puren-orange); font-weight:700; font-size: 1.1rem;">回首頁</a>
    <a href="history.html">緣起沿革</a>
    <a href="organization.html">組織職掌</a>
    <a href="members.html">團隊成員</a>
    <a href="achievements.html" style="color:var(--puren-orange); font-weight:700;">歷屆成果</a>
  </nav>

  <div class="page-header">
    <h1 class="page-title">歷屆成果</h1>
  </div>
  
  <main class="page-content">
    </main>

  <footer>
    <p>© 2026 逐光啟程｜荳陣來作伙 夏令營</p>
  </footer>

</body>
</html>
